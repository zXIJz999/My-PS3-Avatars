<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>zxijz's Avatar Codex</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:          #0c0a08;
    --ink-mid:      #16120d;
    --ink-light:    #1a1208;
    --gold:         rgba(180,140,80,.22);
    --gold-faint:   rgba(180,140,80,.06);
    --gold-text:    #7a6a50;
    --gold-dim:     #5a4a30;
    --gold-dead:    #3a2e1e;
    --gold-trace:   #2a2010;
    --cream:        #e8dfc8;
    --cream-bright: #f0e6cc;
    --red:          #c0392b;
    --red-dark:     #8b1a1a;
    --purple:       #9b59b6;
    --purple-light: #c084fc;
    --sought:       #d4a017;
    --sought-dark:  #8a6800;
    --sought-glow:  rgba(212,160,23,.18);
  }

  html { scroll-behavior: smooth; }

  body {
    background-color: var(--ink);
    background-image:
      repeating-linear-gradient(0deg,  transparent, transparent 59px, var(--gold-faint) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, var(--gold-faint) 60px);
    min-height: 100vh;
    font-family: 'Shippori Mincho', serif;
    color: var(--cream);
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .site-header { text-align: center; padding: 3.5rem 1rem 0; }
  .vermillion-bar { width: 3px; height: 64px; background: var(--red); margin: 0 auto 1.5rem; }
  .seal {
    width: 90px; height: 90px; border: 2px solid var(--red-dark);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.8rem; position: relative; background: var(--red);
  }
  .seal::before { content: ''; position: absolute; inset: 5px; border: 1px solid rgba(255,255,255,.18); }
  .seal-inner { width: 38px; height: 38px; border: 2px solid rgba(255,255,255,.3); position: relative; }
  .seal-inner::after { content: ''; position: absolute; inset: 5px; background: rgba(255,255,255,.12); }
  .site-title {
    font-size: clamp(1.2rem, 3vw, 1.6rem); font-weight: 700;
    letter-spacing: .38em; color: var(--cream-bright); text-transform: uppercase;
  }
  .site-subtitle {
    font-family: 'IBM Plex Mono', monospace; font-size: .68rem;
    color: var(--gold-text); letter-spacing: .25em; margin-top: .55rem; text-transform: uppercase;
  }

  /* ── DIVIDER ── */
  .divider { display: flex; align-items: center; gap: 1rem; max-width: 1100px; margin: 1.8rem auto; padding: 0 2rem; }
  .divider-line { flex: 1; height: 1px; background: var(--gold); }
  .divider-label {
    font-family: 'IBM Plex Mono', monospace; font-size: .63rem; color: var(--gold-dim);
    letter-spacing: .3em; white-space: nowrap; text-transform: uppercase;
  }

  /* ── CONTROLS ── */
  .controls { display: flex; align-items: center; justify-content: center; gap: 1rem; padding: 0 1.5rem .5rem; flex-wrap: wrap; }
  .search-wrap { position: relative; display: flex; align-items: center; }
  .search-wrap input {
    background: var(--ink-mid); border: 1px solid var(--gold-dead); border-radius: 0;
    color: var(--cream); font-family: 'IBM Plex Mono', monospace; font-size: .78rem;
    padding: .52rem 2.2rem .52rem 1rem; width: 280px; outline: none;
    letter-spacing: .08em; transition: border-color .22s, box-shadow .22s;
  }
  .search-wrap input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(192,57,43,.12); }
  .search-wrap input::placeholder { color: var(--gold-trace); }
  .search-icon { position: absolute; right: .75rem; font-size: 13px; color: var(--gold-dim); pointer-events: none; }
  .count-pill {
    font-family: 'IBM Plex Mono', monospace; font-size: .68rem; color: var(--gold-text);
    letter-spacing: .18em; border: 1px solid var(--gold-trace); padding: .32rem 1rem;
    background: var(--ink-mid); white-space: nowrap;
  }

  /* ── TAB BAR ── */
  .tab-bar {
    display: flex; justify-content: center; gap: .5rem;
    padding: 0 1.5rem .5rem; flex-wrap: wrap;
    max-width: 1100px; margin: 0 auto;
  }
  .tab-btn {
    font-family: 'IBM Plex Mono', monospace; font-size: .65rem; letter-spacing: .18em;
    text-transform: uppercase; border: 1px solid var(--gold-dead);
    background: transparent; color: var(--gold-dim); padding: .32rem 1rem; cursor: pointer;
    transition: color .15s, border-color .15s, background .15s;
  }
  .tab-btn:hover { color: var(--cream); border-color: var(--gold-text); }
  .tab-btn.active { color: var(--cream-bright); border-color: var(--purple); background: rgba(155,89,182,.15); }
  .tab-btn.sought-tab.active { border-color: var(--sought); background: rgba(212,160,23,.12); color: var(--sought); }

  /* ── MAIN WRAP ── */
  .main-wrap { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 4rem; }

  /* ── SECTION ── */
  .section { margin-bottom: 3rem; }
  .section-header {
    display: flex; align-items: center; gap: 1rem;
    padding: .7rem 1rem; margin-bottom: 1px;
    background: var(--ink-mid); border: 1px solid var(--gold-dead);
    cursor: pointer; user-select: none;
  }
  .section-header:hover { border-color: var(--gold-dim); }
  .section-title {
    font-family: 'Shippori Mincho', serif; font-size: .95rem; font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase; color: var(--cream-bright);
    flex: 1;
  }
  .section-count {
    font-family: 'IBM Plex Mono', monospace; font-size: .6rem;
    color: var(--gold-dim); letter-spacing: .15em;
  }
  .section-arrow {
    font-family: 'IBM Plex Mono', monospace; font-size: .7rem;
    color: var(--gold-dim); transition: transform .2s;
  }
  .section-header.collapsed .section-arrow { transform: rotate(-90deg); }

  /* Sought-after section styling */
  .sought-section .section-header {
    border-color: var(--sought-dark);
    background: linear-gradient(90deg, rgba(212,160,23,.08), transparent);
  }
  .sought-section .section-title { color: var(--sought); }
  .sought-section .section-header::before {
    content: '★'; color: var(--sought); font-size: .85rem; margin-right: .2rem;
  }

  /* ── SOUGHT AFTER BANNER ── */
  .sought-banner {
    display: flex; align-items: center; gap: 1rem;
    max-width: 1100px; margin: 0 auto 0; padding: 0 1.5rem;
  }
  .sought-banner-line { flex: 1; height: 1px; background: rgba(212,160,23,.35); }
  .sought-banner-label {
    font-family: 'IBM Plex Mono', monospace; font-size: .63rem;
    color: var(--sought); letter-spacing: .3em; white-space: nowrap; text-transform: uppercase;
  }

  /* ── GALLERY GRID ── */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 1px;
    background: var(--gold);
  }
  .gallery.collapsed { display: none; }

  /* ── AVATAR CELL ── */
  .av-cell {
    background: var(--ink);
    display: flex; flex-direction: column; align-items: center;
    padding: 1.1rem .6rem .7rem;
    cursor: pointer; position: relative;
    transition: background 200ms;
    overflow: hidden;
  }
  .av-cell::before {
    content: ''; position: absolute; inset: 0;
    border: 0px solid var(--purple); opacity: 0;
    transition: opacity 200ms, border-width 200ms;
    pointer-events: none; z-index: 2;
  }
  .av-cell:hover { background: #13100b; transition: none; }
  .av-cell:hover::before { opacity: 1; border-width: 2px; box-shadow: inset 0 0 14px rgba(155,89,182,.32), 0 0 18px rgba(155,89,182,.2); transition: none; }
  .av-cell:hover .av-frame { transform: scale(1.1) translateY(-3px); box-shadow: 0 0 20px rgba(155,89,182,.5); transition: none; }

  .sought-section .av-cell::before { border-color: var(--sought); }
  .sought-section .av-cell:hover::before { box-shadow: inset 0 0 14px var(--sought-glow), 0 0 18px var(--sought-glow); }
  .sought-section .av-cell:hover .av-frame { box-shadow: 0 0 20px var(--sought-glow); }

  .corner { position: absolute; width: 8px; height: 8px; opacity: 0; transition: opacity 200ms; z-index: 3; }
  .corner-tl { top:4px; left:4px;   border-top:1px solid var(--purple); border-left:1px solid var(--purple); }
  .corner-tr { top:4px; right:4px;  border-top:1px solid var(--purple); border-right:1px solid var(--purple); }
  .corner-bl { bottom:4px; left:4px;  border-bottom:1px solid var(--purple); border-left:1px solid var(--purple); }
  .corner-br { bottom:4px; right:4px; border-bottom:1px solid var(--purple); border-right:1px solid var(--purple); }
  .av-cell:hover .corner { opacity: 1; transition: none; }
  .sought-section .corner-tl, .sought-section .corner-tr,
  .sought-section .corner-bl, .sought-section .corner-br {
    border-color: var(--sought);
  }

  .av-frame {
    width: 84px; height: 84px; border: 1px solid var(--gold-trace);
    overflow: hidden; position: relative;
    transition: transform 280ms cubic-bezier(.34,1.56,.64,1), box-shadow 250ms;
    background: var(--ink-light); flex-shrink: 0;
  }
  .av-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .av-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  .av-ph svg { width: 34px; height: 34px; opacity: .14; }

  .av-code {
    margin-top: .7rem; font-family: 'IBM Plex Mono', monospace;
    font-size: .52rem; color: var(--gold-dim); letter-spacing: .04em;
    text-align: center; word-break: break-all; max-width: 120px; line-height: 1.5;
  }
  .av-cell:hover .av-code { color: var(--purple-light); transition: none; }
  .sought-section .av-cell:hover .av-code { color: var(--sought); }

  .av-copy-btn {
    margin-top: .4rem; font-family: 'IBM Plex Mono', monospace;
    font-size: .48rem; letter-spacing: .1em; text-transform: uppercase;
    border: 1px solid var(--gold-trace); background: transparent;
    color: var(--gold-dead); padding: .2rem .55rem; cursor: pointer;
    white-space: nowrap; position: relative; z-index: 4;
    transition: color .15s, border-color .15s, background .15s;
  }
  .av-copy-btn:hover { color: var(--cream); border-color: var(--purple); background: rgba(155,89,182,.18); }
  .av-copy-btn.copied { color: #7ecfa0; border-color: #3a6a50; }

  /* ── NO RESULTS ── */
  .no-res {
    text-align: center; padding: 3rem 1rem;
    font-family: 'IBM Plex Mono', monospace; font-size: .78rem;
    color: var(--gold-dead); letter-spacing: .2em; display: none;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 2.2rem; left: 50%;
    transform: translateX(-50%) translateY(14px);
    background: var(--ink-mid); border: 1px solid var(--purple); color: var(--cream);
    font-family: 'IBM Plex Mono', monospace; font-size: .74rem; padding: .55rem 1.5rem;
    letter-spacing: .1em; opacity: 0; transition: opacity .2s, transform .2s;
    pointer-events: none; z-index: 9999;
    box-shadow: 0 0 28px rgba(155,89,182,.28); white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── LIGHTBOX ── */
  .lightbox {
    position: fixed; inset: 0; z-index: 8888;
    display: flex; align-items: center; justify-content: center;
    background: rgba(6,4,2,.92);
    opacity: 0; pointer-events: none; transition: opacity .18s;
  }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lb-inner { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; }
  .lb-img-wrap {
    width: min(78vw, 78vh, 520px); height: min(78vw, 78vh, 520px);
    border: 1px solid rgba(180,140,80,.35); background: var(--ink-light);
    position: relative; overflow: hidden;
    box-shadow: 0 0 60px rgba(155,89,182,.25);
  }
  .lb-img-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .lb-corner { position: absolute; width: 20px; height: 20px; z-index: 2; }
  .lb-corner-tl { top:8px; left:8px;   border-top:2px solid var(--purple); border-left:2px solid var(--purple); }
  .lb-corner-tr { top:8px; right:8px;  border-top:2px solid var(--purple); border-right:2px solid var(--purple); }
  .lb-corner-bl { bottom:8px; left:8px;  border-bottom:2px solid var(--purple); border-left:2px solid var(--purple); }
  .lb-corner-br { bottom:8px; right:8px; border-bottom:2px solid var(--purple); border-right:2px solid var(--purple); }
  .lb-code { font-family: 'IBM Plex Mono', monospace; font-size: .9rem; color: var(--cream-bright); letter-spacing: .18em; text-align: center; }
  .lb-group { font-family: 'IBM Plex Mono', monospace; font-size: .65rem; color: var(--gold-text); letter-spacing: .2em; text-transform: uppercase; }
  .lb-actions { display: flex; gap: .75rem; align-items: center; }
  .lb-copy-btn {
    font-family: 'IBM Plex Mono', monospace; font-size: .68rem; letter-spacing: .14em;
    text-transform: uppercase; border: 1px solid var(--purple);
    background: rgba(155,89,182,.14); color: var(--purple-light);
    padding: .42rem 1.2rem; cursor: pointer;
  }
  .lb-copy-btn:hover { background: rgba(155,89,182,.3); color: var(--cream); }
  .lb-copy-btn.copied { color: #7ecfa0; border-color: #3a6a50; }
  .lb-close-btn {
    font-family: 'IBM Plex Mono', monospace; font-size: .68rem; letter-spacing: .14em;
    text-transform: uppercase; border: 1px solid var(--gold-dead);
    background: transparent; color: var(--gold-dim); padding: .42rem 1.2rem; cursor: pointer;
  }
  .lb-close-btn:hover { border-color: var(--gold-text); color: var(--cream); }

  /* ── FOOTER ── */
  .site-footer {
    text-align: center; padding: 1.5rem 1rem 3rem;
    font-family: 'IBM Plex Mono', monospace; font-size: .6rem;
    color: var(--gold-trace); letter-spacing: .35em; text-transform: uppercase;
  }

  @media (max-width: 480px) {
    .gallery { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); }
    .search-wrap input { width: 200px; }
    .lb-img-wrap { width: 90vw; height: 90vw; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="vermillion-bar"></div>
  <div class="seal"><div class="seal-inner"></div></div>
  <div class="site-title">zxijz's Avatar Codex</div>
  <div class="site-subtitle">psna · digital reliquary · zxijz</div>
</header>

<div class="divider"><div class="divider-line"></div><div class="divider-label">collection</div><div class="divider-line"></div></div>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="srch" placeholder="search PSNA code or game…" autocomplete="off" spellcheck="false" />
    <span class="search-icon">⌕</span>
  </div>
  <div class="count-pill" id="countPill">loading…</div>
</div>

<div class="divider"><div class="divider-line"></div><div class="divider-label">index</div><div class="divider-line"></div></div>

<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" data-filter="all">All</button>
  <button class="tab-btn sought-tab" data-filter="sought">★ Sought After</button>
  <button class="tab-btn" data-filter="normal">Standard</button>
</div>

<div class="main-wrap">
  <div id="content"></div>
  <div class="no-res" id="noRes">no results found</div>
</div>

<footer class="site-footer">avatar codex &nbsp;·&nbsp; psna matcher &nbsp;·&nbsp; zxijz</footer>
<div class="toast" id="toast"></div>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <div class="lb-inner">
    <div class="lb-img-wrap" id="lbImgWrap">
      <div class="lb-corner lb-corner-tl"></div>
      <div class="lb-corner lb-corner-tr"></div>
      <div class="lb-corner lb-corner-bl"></div>
      <div class="lb-corner lb-corner-br"></div>
    </div>
    <div class="lb-group" id="lbGroup"></div>
    <div class="lb-code" id="lbCode"></div>
    <div class="lb-actions">
      <button class="lb-copy-btn" id="lbCopyBtn">Copy PSNA</button>
      <button class="lb-close-btn" id="lbCloseBtn">Close ×</button>
    </div>
  </div>
</div>

<script>
const PHOTOS_DIR = 'photos/';
const PSNA_RE    = /PSNA[_\-]?([0-9A-Fa-f]+)/i;

const PH_SVG = `<svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect x="3" y="3" width="32" height="32" stroke="#c8b882" stroke-width="1"/>
  <line x1="3" y1="3" x2="35" y2="35" stroke="#c8b882" stroke-width="1"/>
  <line x1="35" y1="3" x2="3" y2="35" stroke="#c8b882" stroke-width="1"/>
</svg>`;

function extractPSNA(filename) {
  const m = filename.match(PSNA_RE);
  return m ? 'PSNA_' + m[1].toUpperCase() : filename.replace(/\.[^.]+$/, '').toUpperCase();
}

// ── DOM refs ──────────────────────────────────────────────────────────────────
const content   = document.getElementById('content');
const toast     = document.getElementById('toast');
const srch      = document.getElementById('srch');
const countPill = document.getElementById('countPill');
const noRes     = document.getElementById('noRes');
const lightbox  = document.getElementById('lightbox');
const lbImgWrap = document.getElementById('lbImgWrap');
const lbCode    = document.getElementById('lbCode');
const lbGroup   = document.getElementById('lbGroup');
const lbCopyBtn = document.getElementById('lbCopyBtn');
const lbCloseBtn= document.getElementById('lbCloseBtn');
const tabBar    = document.getElementById('tabBar');

let MANIFEST     = null;   // { sought_after: [...], normal: [...] }
let activeFilter = 'all';  // 'all' | 'sought' | 'normal'
let searchQuery  = '';
let toastTimer, searchTimer;

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

// ── Copy ──────────────────────────────────────────────────────────────────────
function copyPSNA(psna, btn) {
  navigator.clipboard.writeText(psna).catch(() => {});
  showToast(psna + ' — copied');
  if (!btn) return;
  const orig = btn.textContent;
  btn.textContent = 'Copied!';
  btn.classList.add('copied');
  clearTimeout(btn._t);
  btn._t = setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function openLightbox(d) {
  const corners = [...lbImgWrap.querySelectorAll('.lb-corner')];
  lbImgWrap.innerHTML = '';
  corners.forEach(c => lbImgWrap.appendChild(c));

  if (d.src) {
    const img = document.createElement('img');
    img.src = d.src; img.alt = d.psna;
    lbImgWrap.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'av-ph'; ph.innerHTML = PH_SVG;
    lbImgWrap.appendChild(ph);
  }

  lbGroup.textContent = d.group || '';
  lbCode.textContent  = d.psna;
  lbCopyBtn.textContent = 'Copy PSNA';
  lbCopyBtn.classList.remove('copied');
  lbCopyBtn.onclick = () => copyPSNA(d.psna, lbCopyBtn);
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

lbCloseBtn.addEventListener('click', closeLightbox);
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── Cell builder ──────────────────────────────────────────────────────────────
function makeCell(d) {
  const cell = document.createElement('div');
  cell.className = 'av-cell';

  ['tl','tr','bl','br'].forEach(p => {
    const c = document.createElement('div');
    c.className = 'corner corner-' + p;
    cell.appendChild(c);
  });

  const frame = document.createElement('div');
  frame.className = 'av-frame';

  if (d.src) {
    const img = document.createElement('img');
    img.src = d.src; img.alt = d.psna; img.loading = 'lazy';
    img.onerror = () => { const ph = document.createElement('div'); ph.className='av-ph'; ph.innerHTML=PH_SVG; img.replaceWith(ph); };
    frame.appendChild(img);
  } else {
    frame.innerHTML = `<div class="av-ph">${PH_SVG}</div>`;
  }

  const code = document.createElement('div');
  code.className = 'av-code';
  code.textContent = d.psna;

  const copyBtn = document.createElement('button');
  copyBtn.className = 'av-copy-btn';
  copyBtn.textContent = 'Copy PSNA';
  copyBtn.addEventListener('click', e => { e.stopPropagation(); copyPSNA(d.psna, copyBtn); });

  cell.appendChild(frame);
  cell.appendChild(code);
  cell.appendChild(copyBtn);
  cell.addEventListener('click', () => openLightbox(d));
  return cell;
}

// ── Section builder ───────────────────────────────────────────────────────────
function makeSection(groupEntry, isSought) {
  const { group, files } = groupEntry;

  const section = document.createElement('div');
  section.className = 'section' + (isSought ? ' sought-section' : '');
  section.dataset.group = group.toLowerCase();

  const header = document.createElement('div');
  header.className = 'section-header';

  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = group;

  const countEl = document.createElement('div');
  countEl.className = 'section-count';
  countEl.textContent = files.length + ' avatar' + (files.length !== 1 ? 's' : '');

  const arrow = document.createElement('div');
  arrow.className = 'section-arrow';
  arrow.textContent = '▾';

  header.appendChild(title);
  header.appendChild(countEl);
  header.appendChild(arrow);

  const gallery = document.createElement('div');
  gallery.className = 'gallery';

  const frag = document.createDocumentFragment();
  files.forEach(fileObj => {
    // Support parsed python objects OR legacy filename strings
    let psna, srcFile;
    if (typeof fileObj === 'string') {
        psna = extractPSNA(fileObj);
        srcFile = fileObj;
    } else {
        psna = extractPSNA(fileObj.psnaCode);
        srcFile = fileObj.imgFile;
    }

    const d = { 
        psna, 
        src: srcFile ? PHOTOS_DIR + srcFile : null, 
        group 
    };
    frag.appendChild(makeCell(d));
  });
  gallery.appendChild(frag);

  header.addEventListener('click', () => {
    header.classList.toggle('collapsed');
    gallery.classList.toggle('collapsed');
    arrow.textContent = header.classList.contains('collapsed') ? '▸' : '▾';
  });

  section.appendChild(header);
  section.appendChild(gallery);
  return section;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  if (!MANIFEST) return;
  content.innerHTML = '';

  const q = searchQuery.toLowerCase();

  let totalVisible = 0;
  let anySought = false;

  function buildGroup(groups, isSought) {
    const sectionFrag = document.createDocumentFragment();
    let count = 0;
    groups.forEach(g => {
      // filter tabs
      if (activeFilter === 'sought' && !isSought) return;
      if (activeFilter === 'normal' && isSought) return;

      // filter search by checking both the individual PSNA code AND the game group name
      const groupMatches = q && g.group.toLowerCase().includes(q);
      const filteredFiles = q
        ? g.files.filter(f => {
            const code = typeof f === 'string' ? f : f.psnaCode;
            return code.toLowerCase().includes(q) || g.group.toLowerCase().includes(q);
          })
        : g.files;

      if (q && filteredFiles.length === 0) return;

      const entry = { group: g.group, files: filteredFiles };
      sectionFrag.appendChild(makeSection(entry, isSought));
      count += filteredFiles.length;
      if (isSought) anySought = true;
    });
    totalVisible += count;
    return sectionFrag;
  }

  // Sought after section
  if (MANIFEST.sought_after && MANIFEST.sought_after.length) {
    const soughtFrag = buildGroup(MANIFEST.sought_after, true);
    if (soughtFrag.childNodes.length) {
      const banner = document.createElement('div');
      banner.className = 'sought-banner';
      banner.innerHTML = `<div class="sought-banner-line"></div><div class="sought-banner-label">★ Sought After</div><div class="sought-banner-line"></div>`;
      content.appendChild(banner);
      content.appendChild(soughtFrag);

      const div2 = document.createElement('div');
      div2.className = 'divider';
      div2.innerHTML = `<div class="divider-line"></div><div class="divider-label">standard collection</div><div class="divider-line"></div>`;
      content.appendChild(div2);
    }
  }

  // Normal section
  const normalFrag = buildGroup(MANIFEST.normal || [], false);
  content.appendChild(normalFrag);

  noRes.style.display = totalVisible === 0 ? 'block' : 'none';
  countPill.textContent = totalVisible.toLocaleString() + ' avatar' + (totalVisible !== 1 ? 's' : '');
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
tabBar.addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  [...tabBar.querySelectorAll('.tab-btn')].forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  window.scrollTo({ top: 0 });
  render();
});

// ── Search ────────────────────────────────────────────────────────────────────
srch.addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    window.scrollTo({ top: 0 });
    render();
  }, 180);
});

// ── Bootstrap ─────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(PHOTOS_DIR + 'manifest.json');
    if (!res.ok) throw new Error();
    const data = await res.json();

    // Dynamically bridge Python script output format to HTML
    if (data.games !== undefined) {
      MANIFEST = { sought_after: [], normal: [] };

      const formatGroup = (arr) => arr.map(item => ({
          group: item.game,
          files: item.edats.map(e => ({
              psnaCode: e.edat,
              imgFile: e.png || null
          }))
      }));

      MANIFEST.sought_after = formatGroup(data.sought_after || []);
      MANIFEST.normal = formatGroup(data.games || []);

      if (data.loose) {
          for (const [key, edats] of Object.entries(data.loose)) {
              MANIFEST.normal.push({
                  group: key,
                  files: edats.map(e => ({
                      psnaCode: e.edat,
                      imgFile: e.png || null
                  }))
              });
          }
      }
      MANIFEST.normal.sort((a,b) => a.group.localeCompare(b.group));
    } else {
      // Legacy format fallback
      MANIFEST = Array.isArray(data) 
        ? { sought_after: [], normal: [{ group: 'All Avatars', files: data }] } 
        : data;
    }
  } catch {
    countPill.textContent = 'manifest.json not found';
    noRes.style.display = 'block';
    noRes.textContent = 'Add photos/manifest.json to your repo.';
    return;
  }
  render();
}

init();
</script>
